<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}InvoiceFlow{% endblock %}</title>
  <style>
    body { margin: 0; padding: 0; background-color: #f1f5f9; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; color: #0f172a; }
    .wrapper { max-width: 560px; margin: 0 auto; padding: 24px 16px; }
    .card { background: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 24px rgba(15, 23, 42, 0.08); border: 1px solid #e2e8f0; }
    .header { background: linear-gradient(135deg, #0f172a 0%, #134e4a 100%); color: #f8fafc; padding: 24px 28px; }
    .header h1 { margin: 0; font-size: 20px; font-weight: 600; letter-spacing: -0.02em; }
    .header p { margin: 8px 0 0; font-size: 13px; opacity: 0.85; }
    .body { padding: 28px; font-size: 15px; line-height: 1.6; color: #334155; }
    .body p { margin: 0 0 16px; }
    .body p:last-child { margin-bottom: 0; }
    .btn { display: inline-block; margin: 20px 0 8px; padding: 12px 24px; background: #059669; color: #ffffff !important; text-decoration: none; font-weight: 600; font-size: 14px; border-radius: 8px; }
    .muted { font-size: 13px; color: #64748b; margin-top: 24px; padding-top: 20px; border-top: 1px solid #e2e8f0; }
    .meta { background: #f8fafc; border-radius: 8px; padding: 16px 18px; margin: 20px 0; font-size: 14px; }
    .meta table { width: 100%; border-collapse: collapse; }
    .meta td { padding: 6px 0; vertical-align: top; }
    .meta td:first-child { color: #64748b; width: 42%; }
    strong { color: #0f172a; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="card">
      {% block header %}
      <div class="header">
        <h1>{% block header_title %}InvoiceFlow{% endblock %}</h1>
        {% block header_sub %}{% endblock %}
      </div>
      {% endblock %}
      <div class="body">
        {% block body %}{% endblock %}
        {% block footer %}
        <p class="muted">This message was sent by {{ merchant_name }}. If you did not expect this email, you can ignore it.</p>
        {% endblock %}
      </div>
    </div>
  </div>
</body>
</html>
